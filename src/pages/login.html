<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>
  </head>

  <body>
    <div class="auth-container">
      <div class="box rounded-md">
        <div class="logo text-center">
          <img src="./src/img/logo.png" alt="" />
        </div>
        <h4 class="text-center py-3 text-primary">Đăng nhập</h4>
        <form action="" id="login-form">
          <div class="form-group d-flex align-items-center rounded-sm mb-4">
            <span class="icon"><i class="fa-light fa-envelope"></i></span>
            <input
              type="email"
              class="form-control inp-email"
              placeholder="Email"
              name="email"
            />
          </div>
          <div class="form-group d-flex align-items-center rounded-sm mb-4">
            <span class="icon"><i class="fa-light fa-lock"></i></span>
            <input
              type="password"
              class="form-control inp-pwd"
              placeholder="Password"
              name="pwd"
            />
          </div>

          <div class="">
            <button type="submit" class="form-control btn btn-primary">
              Đăng nhập
            </button>
            <div
              id="login-with-google"
              class="form-control btn btn-secondary mt-2 cursor-pointer"
            >
              Đăng nhập với google
            </div>
            <p class="text-center mt-4">
              <span class="text-white">Chưa có tài khoản?</span>
              <a href="./register.html" class="ms-1">Đăng ký</a>
            </p>
          </div>
        </form>
      </div>
    </div>

    <!-- Functions -->
    <script>
      let userSession = JSON.parse(localStorage.getItem("user_session"));
    </script>
    <script type="module" src="../js/login.js"></script>
  </body>
</html>
