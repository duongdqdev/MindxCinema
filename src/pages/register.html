<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng ký</title>
  </head>

  <body>
    <div class="auth-container">
      <div class="box rounded-md">
        <div class="logo text-center">
          <img src="./src/img/logo.png" alt="" />
        </div>
        <h4 class="text-center py-3 text-primary">Đăng ký</h4>
        <form action="" id="register-form">
          <div class="form-group d-flex align-items-center rounded-sm mb-4">
            <span class="icon"><i class="fa-light fa-user"></i></span>
            <input
              type="text"
              class="form-control inp-username"
              placeholder="Name"
              name="username"
            />
          </div>
          <div class="form-group d-flex align-items-center rounded-sm mb-4">
            <span class="icon"><i class="fa-light fa-envelope"></i></span>
            <input
              type="email"
              class="form-control inp-email"
              placeholder="Email"
              name="email"
            />
          </div>
          <div class="form-group d-flex align-items-center rounded-sm mb-4">
            <span class="icon"><i class="fa-light fa-lock"></i></span>
            <input
              type="password"
              class="form-control inp-pwd"
              placeholder="Password"
              name="pwd"
            />
          </div>
          <div class="form-group d-flex align-items-center rounded-sm mb-4">
            <span class="icon"><i class="fa-light fa-lock"></i></span>
            <input
              type="password"
              class="form-control inp-cf-pw"
              placeholder="Confirm password"
              name="confirm_pwd"
            />
          </div>
          <div class="">
            <button type="submit" class="form-control btn btn-primary">
              Đăng ký
            </button>
            <p class="text-center mt-4">
              <span class="text-white">Đã có tài khoản?</span>
              <a href="./login.html" class="ms-1">Đăng nhập</a>
            </p>
          </div>
        </form>
      </div>
    </div>

    <script type="module" src="../js/register.js"></script>
  </body>
</html>
